# PikoGPT Large Model Configuration
# ==================================
# ~37M parameters - Optimal balance of depth, width, and context
# Recommended as the primary training configuration

[experiment]
name = "pikogpt_large"
description = "Large model: 384 embd, 10 layers, 6 heads, 512 context (~37M params)"
seed = 42

[data]
input_dataset_path = "data/processed/openwebtext_clean"
validation_split = 0.1
split_seed = 42
max_train_samples = 500000        # Use more data for larger model
max_validation_samples = 10000

[tokenizer]
name = "gpt2"
context_length = 512              # Good balance of context and memory
append_eos_token = true

[model]
n_embd = 384                      # Embedding dimension
n_layer = 10                      # Number of transformer blocks
n_head = 6                        # Number of attention heads (head_dim = 64)
dropout = 0.1                     # Standard dropout
layer_norm_epsilon = 1e-5

[training]
device = "auto"
batch_size = 16                   # Adjust based on GPU memory
eval_batch_size = 32
grad_accum_steps = 2              # Gradient accumulation (effective_batch = 16 × world_size × 2)
learning_rate = 3e-4              # Standard for this model size
min_learning_rate = 1e-5 
weight_decay = 0.01
num_epochs = 3
max_train_steps = 50000       # Change from 50000 to 100 for quick test
warmup_steps = 500
log_every_steps = 100       # Change from 100 to 20
eval_every_steps = 500       # Change from 500 to 50
gradient_clip_norm = 1.0

[logging]
base_dir = "runs"
level = "INFO"
train_jsonl_name = "train_metrics.jsonl"
eval_jsonl_name = "eval_metrics.jsonl"